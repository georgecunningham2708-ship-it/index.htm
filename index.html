  /* SCREEN CONTENT */
  #screen {
    position: relative;

  }

  /* STATIC */
  #static {
    position: absolute;
    width: 100%;
    height: 100%;

  @keyframes noise {

    50% { transform: translate(-5%,5%); }
    100% { transform: translate(0,0); }
  }

  /* SCANLINES */
  #scanlines {
    position: absolute;
    width: 100%;

      transparent 2px,
      transparent 4px

    pointer-events: none;
  }

  #vignette {
    position: absolute;
    width: 100%;
    height: 100%;

<script>
let input = "";
const correctCode = "072457";
const display = document.getElementById("codeDisplay");
const secret = document.getElementById("secret");
const flash = document.getElementById("flash");

function updateDisplay() {
  let output = input.split("");
  while (output.length < 6) output.push("-");
  display.innerText = output.join(" ");
}

/* Glitch effect */
function glitch() {
  if (Math.random() < 0.2) {
    let temp = display.innerText.split(" ");
    let index = Math.floor(Math.random() * temp.length);
    temp[index] = Math.floor(Math.random() * 10);
    display.innerText = temp.join(" ");
    setTimeout(updateDisplay, 100);
  }
}
setInterval(glitch, 300);

/* Input */
document.addEventListener("keydown", (e) => {
  if (!isNaN(e.key) && input.length < 6) {
    input += e.key;
    updateDisplay();
  }

  if (e.key === "Backspace") {
    input = input.slice(0, -1);
    updateDisplay();
  }

  if (input.length === 6) {
    if (input === correctCode) {
      secret.style.opacity = 1;
    } else {
      flash.style.opacity = 0.6;
      setTimeout(() => flash.style.opacity = 0, 200);

      setTimeout(() => {
        input = "";
        updateDisplay();
      }, 500);
    }
  }
});

/* Flicker */
setInterval(() => {
  document.getElementById("tv").style.opacity = (Math.random() * 0.05) + 0.95;
}, 200);

</script>
