<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>???</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
  }

  /* 📺 STATIC OVERLAY */
  #static {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.15;
    background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
    animation: noise 0.2s infinite;
  }

  @keyframes noise {
    0% { transform: translate(0,0); }
    10% { transform: translate(-5%, -5%); }
    20% { transform: translate(5%, 5%); }
    30% { transform: translate(-5%, 5%); }
    40% { transform: translate(5%, -5%); }
    50% { transform: translate(-5%, 0); }
    60% { transform: translate(5%, 0); }
    70% { transform: translate(0,5%); }
    80% { transform: translate(0,-5%); }
    100% { transform: translate(0,0); }
  }

  /* Center code */
  #codeDisplay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    letter-spacing: 20px;
    transition: color 0.2s;
  }

  /* Corners */
  .corner {
    position: absolute;
    font-size: 14px;
    opacity: 0.08;
  }

  #tl { top: 10px; left: 10px; }
  #tr { top: 10px; right: 10px; }
  #bl { bottom: 10px; left: 10px; }
  #br { bottom: 10px; right: 10px; }

  /* Secret */
  #secret {
    position: absolute;
    top: 65%;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
  }

  a {
    color: lime;
    text-decoration: none;
    font-size: 20px;
  }

  a:hover {
    text-shadow: 0 0 10px lime;
  }

  /* RED FLASH */
  #flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: red;
    opacity: 0;
    pointer-events: none;
  }

</style>

</head>

<body>

<div id="static"></div>
<div id="flash"></div>

<div id="codeDisplay">- - - - - -</div>

<!-- Hidden numbers -->

<div id="tl" class="corner">0</div>
<div id="tr" class="corner">7</div>
<div id="bl" class="corner">2</div>
<div id="br" class="corner">4 5 7</div>

<div id="secret">
  <a href="https://youtu.be/uSI-hiQRfQQ?si=9rZ64dNKTc4LTO00" target="_blank">
    [ACCESS GRANTED]
  </a>
</div>

<script>
let input = "";
const correctCode = "072457";
const display = document.getElementById("codeDisplay");
const secret = document.getElementById("secret");
const flash = document.getElementById("flash");

/* Update display */
function updateDisplay() {
  let output = input.split("");
  while (output.length < 6) output.push("-");
  display.innerText = output.join(" ");
}

/* Glitch effect */
function glitch() {
  if (Math.random() < 0.2) {
    let temp = display.innerText.split(" ");
    let index = Math.floor(Math.random() * temp.length);
    temp[index] = Math.floor(Math.random() * 10);
    display.innerText = temp.join(" ");

    setTimeout(updateDisplay, 100);
  }
}
setInterval(glitch, 300);

/* Input */
document.addEventListener("keydown", (e) => {
  if (!isNaN(e.key) && input.length < 6) {
    input += e.key;
    updateDisplay();
  }

  if (e.key === "Backspace") {
    input = input.slice(0, -1);
    updateDisplay();
  }

  if (input.length === 6) {
    if (input === correctCode) {
      secret.style.opacity = 1;
    } else {
      // 🔴 wrong code flash
      flash.style.opacity = 0.6;
      setTimeout(() => flash.style.opacity = 0, 200);

      setTimeout(() => {
        input = "";
        updateDisplay();
      }, 500);
    }
  }
});

/* Subtle flicker */
setInterval(() => {
  document.body.style.opacity = (Math.random() * 0.05) + 0.95;
}, 200);

</script>

</body>
</html>
